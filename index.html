<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trapping Rain Water</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <h1>Trapping Rain Water</h1>
    <p>Enter block heights separated by commas, then click Calculate.</p>

    <div class="controls">
      <label for="arrInput">Heights:</label>
      <input id="arrInput" type="text" placeholder="e.g. 0,1,0,2,1,0,1,3,2,1,2,1" />
      <button id="calcBtn" type="button">Calculate</button>
    </div>

    <div id="result" class="result">Result: 0</div>
    <div id="visual" class="visual"></div>
  </main>

  <script src="./dist/index.js"></script>
</body>
</html>
